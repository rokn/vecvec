syntax = "proto3";

package vecvec.v1;

// Go-only option, ignored by prost/tonic; used by the Go SDK's protoc run.
option go_package = "github.com/rokn/vecvec/sdk/go/gen/vecvec/v1;vecvecv1";

// The distance metric a collection ranks by.
enum Metric {
  METRIC_UNSPECIFIED = 0;
  METRIC_COSINE = 1;
  METRIC_DOT = 2;
  METRIC_EUCLIDEAN = 3;
}

// ---- Collections ----

message CreateCollectionRequest {
  string name = 1;
  uint32 dim = 2;
  Metric metric = 3;
}

message CreateCollectionResponse {
  string name = 1;
}

service Collections {
  rpc Create(CreateCollectionRequest) returns (CreateCollectionResponse);
}

// ---- Points ----

message Vector {
  repeated float values = 1;
  // Optional JSON object payload attached to the point.
  optional string payload = 2;
}

// One streamed batch of vectors to append to a collection. At M3 ids are
// server-assigned (returned in UpsertResponse); client-controlled ids land later.
message UpsertRequest {
  string collection = 1;
  repeated Vector vectors = 2;
}

message UpsertResponse {
  uint64 inserted = 1;
  repeated uint64 ids = 2;
}

// An atomic mixed write: deletes + upserts applied as one indivisible batch
// under a single WAL lock (so concurrent readers and crash recovery see all of
// it or none). Optionally commits a new version afterwards, under the same lock,
// so the version's boundary is exactly this batch — the closest thing the engine
// offers to a transaction.
message WriteBatchRequest {
  string collection = 1;
  // Vectors to upsert; server-assigned ids are returned in WriteBatchResponse.
  repeated Vector upserts = 2;
  // Point ids to tombstone.
  repeated uint64 deletes = 3;
  // If true, commit a new version after the batch is applied.
  bool commit = 4;
  // Commit metadata; only used when commit = true.
  optional string message = 5;
  optional string tag = 6;
}

message WriteBatchResponse {
  // Server-assigned ids for the upserted vectors, in input order.
  repeated uint64 ids = 1;
  // How many of the requested deletes were newly applied (missing or
  // already-deleted ids don't count).
  uint64 deleted = 2;
  // The version created if this batch committed, else absent.
  optional uint64 version = 3;
}

service Points {
  // Client-streaming bulk insert: many UpsertRequest batches -> one response.
  rpc Upsert(stream UpsertRequest) returns (UpsertResponse);
  // Atomic mixed delete + upsert, with optional commit-after (a transaction-like
  // unit of work).
  rpc WriteBatch(WriteBatchRequest) returns (WriteBatchResponse);
}

// ---- Query ----

// Selects a version to read for time-travel; absent = the live HEAD.
message VersionRef {
  oneof selector {
    uint64 version = 1;
    string tag = 2;
    string branch = 3;
  }
}

message QueryRequest {
  string collection = 1;
  repeated float vector = 2;
  uint32 k = 3;
  // Time-travel: read as of this version/tag/branch. Absent = live.
  optional VersionRef at = 4;
  // Optional JSON filter (must/should/must_not over field conditions).
  optional string filter = 5;
  // Include payloads in the response.
  bool include_payloads = 6;
}

message ScoredPoint {
  uint64 id = 1;
  float score = 2;
  // The optional payload for the matched point if requested in QueryRequest.
  optional string payload = 3;
}

message QueryResponse {
  repeated ScoredPoint results = 1;
}

message RecommendRequest {
  string collection = 1;
  repeated uint64 positive = 2;
  repeated uint64 negative = 3;
  uint32 k = 4;
  optional string filter = 5;
  // Include payloads in the response.
  bool include_payloads = 6;
}

service Query {
  rpc Query(QueryRequest) returns (QueryResponse);
  // Recommend-by-example: query from positive/negative example point ids.
  rpc Recommend(RecommendRequest) returns (QueryResponse);
}

// ---- Versioning (the differentiator) ----

message ListVersionsRequest {
  string collection = 1;
}

message VersionInfo {
  uint64 version = 1;
  optional uint64 parent = 2;
  uint64 created_at_ms = 3;
  string trigger = 4;
  optional string message = 5;
}

message ListVersionsResponse {
  repeated VersionInfo versions = 1;
  optional uint64 head = 2;
}

message CommitRequest {
  string collection = 1;
  optional string message = 2;
  optional string tag = 3;
}

message CommitResponse {
  uint64 version = 1;
}

message TagRequest {
  string collection = 1;
  string name = 2;
  uint64 version = 3;
}

message BranchRequest {
  string collection = 1;
  string name = 2;
  uint64 version = 3;
}

message RefResponse {}

message DiffRequest {
  string collection = 1;
  uint64 from = 2;
  uint64 to = 3;
}

message DiffResponse {
  repeated uint64 added = 1;
  repeated uint64 removed = 2;
}

message RestoreRequest {
  string collection = 1;
  uint64 version = 2;
}

message RestoreResponse {
  uint64 version = 1;
}

service Versioning {
  rpc ListVersions(ListVersionsRequest) returns (ListVersionsResponse);
  rpc Commit(CommitRequest) returns (CommitResponse);
  rpc CreateTag(TagRequest) returns (RefResponse);
  rpc CreateBranch(BranchRequest) returns (RefResponse);
  rpc Diff(DiffRequest) returns (DiffResponse);
  rpc Restore(RestoreRequest) returns (RestoreResponse);
}
