name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy
      # vecvec-proto's build.rs runs protoc (tonic/prost codegen); runners lack it.
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      # vecvec-proto's build.rs runs protoc (tonic/prost codegen); runners lack it.
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace
      # Cross-check the hand-written SIMD kernels against the simsimd reference.
      - run: cargo test -p vecvec-core --features oracle matches_simsimd

  test-arm:
    name: test (aarch64)
    # The other jobs run on x86_64, so the aarch64 NEON kernels (selected on every
    # Apple-silicon / ARMv8 machine — the primary deployment target) are otherwise
    # never compiled or correctness-checked in CI. This job runs the core suite on ARM
    # (covering distance::aarch64's NEON kernels) plus the simsimd parity check.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p vecvec-core
      - run: cargo test -p vecvec-core --features oracle matches_simsimd

  bench:
    name: bench-compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      # vecvec-proto's build.rs runs protoc (tonic/prost codegen); runners lack it.
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
      # Keep the criterion benches compiling (recall@k + latency regression gating
      # against stored baselines is a follow-up; miri is skipped because the SIMD
      # intrinsics and mmap segment loading aren't supported by the interpreter).
      - run: cargo bench --workspace --no-run

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  go-sdk:
    name: go-sdk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: sdk/go/go.sum
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      # protoc plugins for the Makefile's `generate` target.
      - run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
      # Regenerate the stubs from the canonical crate proto and fail if the
      # checked-in gen/ output drifted (i.e. someone edited vecvec.proto without
      # running `make generate`).
      - run: make generate
        working-directory: sdk/go
      - run: git diff --exit-code sdk/go/gen
      - run: make build
        working-directory: sdk/go
      - run: go test ./...
        working-directory: sdk/go
